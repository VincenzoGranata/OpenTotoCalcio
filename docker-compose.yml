services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: totosport_app
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - db
    volumes:
      - .:/var/www/html
      # Evitiamo che il mount della root sovrascriva le cartelle generate nel container
      - /var/www/html/vendor
      - /var/www/html/assets/dist
      - ./docker/php.ini:/usr/local/etc/php/php.ini:ro
    environment:
      - DB_HOST=db
      - DB_NAME=totosport
      - DB_USER=root
      - DB_PASSWORD=secret
    networks:
      - default

  db:
    image: mysql:8.3
    container_name: totosport_db
    restart: always
    ports:
      - "3306:3306"
    environment:
      - MYSQL_DATABASE=totosport
      - MYSQL_ROOT_PASSWORD=secret
    volumes:
      - db_data:/var/lib/mysql
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

volumes:
  db_data:
